name: Build and Publish Docker Image

# This triggers the build automatically every time you push to the main branch
on:
  push:
    branches: ['main']

env:
  REGISTRY: ghcr.io
  # github.repository automatically fills in "YourUsername/lastwar-alliance-manager"
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    # Grants the action permission to push to your registry
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # This token is automatically generated by GitHub, no setup required!
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest