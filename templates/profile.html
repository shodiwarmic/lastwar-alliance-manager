{{define "header_text"}}
    <h1>🎮 Last War: Survival</h1>
    <h2>My Profile</h2>
{{end}}

{{define "content"}}
            <section class="form-section">
                <h3>🔐 Change Password</h3>
                <form id="password-form">
                    <div class="form-group">
                        <label for="current-password">Current Password:</label>
                        <input type="password" id="current-password" required>
                    </div>
                    <div class="form-group">
                        <label for="new-password">New Password:</label>
                        <input type="password" id="new-password" required>
                        <ul id="password-rules" style="margin-top: 8px; padding-left: 0; list-style: none; font-size: 0.85em; line-height: 1.6;">
                            <li style="color: #666;">⚪ Loading requirements...</li>
                        </ul>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Confirm New Password:</label>
                        <input type="password" id="confirm-password" required>
                        <div id="match-status" style="margin-top: 5px; font-size: 0.85em; font-weight: bold; display: none;"></div>
                    </div>
                    <div class="button-group">
                        <button type="submit" id="submit-pwd-btn" class="primary-btn" disabled style="opacity: 0.6; cursor: not-allowed;">🔒 Change Password</button>
                    </div>
                </form>
            </section>

            <section class="info-section">
                <h3>ℹ️ Account Information</h3>
                <div class="info-card">
                    <p><strong>Username:</strong> <span id="profile-username">-</span></p>
                    <p><strong>Role:</strong> <span id="profile-role">-</span></p>
                    <p id="profile-member-info" style="display: none;"><strong>Linked Member:</strong> <span id="profile-member">-</span></p>
                </div>
            </section>
{{end}}

{{define "scripts"}}
    <script src="profile.js"></script>
{{end}}
