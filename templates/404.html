{{define "header_text"}}
    <h1>
        <svg width="18" height="18" aria-hidden="true" class="svg-icon"><use href="/icons.svg#icon-search"/></svg>
        404 - Not Found
    </h1>
    <h2>Lost in the Wasteland</h2>
{{end}}

{{define "content"}}
    <div class="error-page">
        <span class="error-page-icon"><svg width="80" height="80" aria-hidden="true" class="svg-icon"><use href="/icons.svg#icon-map"/></svg></span>
        <h2 style="margin-bottom: 10px;">This sector is empty.</h2>
        <p class="error-page-text">The page you are looking for doesn't exist, has been moved, or was destroyed by zombies.</p>
        <a href="/" class="btn btn-primary error-page-link">Return to Base (Home)</a>
    </div>
{{end}}
