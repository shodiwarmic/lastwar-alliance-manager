{{define "header_text"}}
    <h1>⚔️ Last War: Survival</h1>
    <h2>VS Points Tracker</h2>
{{end}}

{{define "head_tags"}}
    <link rel="stylesheet" href="vs.css">
{{end}}

{{define "content"}}
    <section class="controls">
        <div class="week-selector">
            <button id="prev-week" class="week-nav-btn">← Previous Week</button>
            <div class="week-info">
                <h3 id="week-display">Loading...</h3>
                <p class="week-subtitle">Day 1 - Day 6 VS Points</p>
            </div>
            <button id="next-week" class="week-nav-btn">Next Week →</button>
        </div>
        <div class="action-buttons" id="admin-actions">
            <button id="toggle-mode-btn" class="save-btn calc-mode-btn hidden">🧮 Enter Weekly Totals</button>
            
            <input type="file" id="csv-file-input" accept=".csv" class="hidden">
            <button id="csv-import-btn" class="save-btn csv-btn hidden">📄 Import CSV</button>
            <button id="save-btn" class="save-btn hidden">💾 Save Points</button>
            <button id="clear-btn" class="clear-btn hidden">🗑️ Clear Week</button>
        </div>
    </section>

    <section>
        <input type="text" id="search-box" class="search-box" placeholder="🔍 Search member...">
    </section>

    <section class="table-wrapper">
        <table class="vs-table" id="vs-table">
            <thead>
                <tr>
                    <th data-sort="name" class="sort-asc">Member</th>
                    <th data-sort="monday">Day 1</th>
                    <th data-sort="tuesday">Day 2</th>
                    <th data-sort="wednesday">Day 3</th>
                    <th data-sort="thursday">Day 4</th>
                    <th data-sort="friday">Day 5</th>
                    <th id="day6-header" data-sort="saturday">Day 6</th>
                    <th id="total-header" data-sort="total">Total</th>
                </tr>
            </thead>
            <tbody id="vs-tbody">
                <tr>
                    <td colspan="8" style="text-align: center; padding: 20px;">Loading members...</td>
                </tr>
            </tbody>
        </table>
    </section>
{{end}}

{{define "scripts"}}
    <script src="vs.js"></script>
{{end}}
