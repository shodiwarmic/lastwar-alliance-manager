{{define "head_tags"}}
<link rel="stylesheet" href="/officer_command.css">
<link rel="stylesheet" href="/member-picker.css">
{{end}}

{{define "header_text"}}
<h1>
        <svg width="18" height="18" aria-hidden="true" class="svg-icon"><use href="/icons.svg#icon-flag"/></svg>
        Officers
    </h1>
    <h2>Alliance Responsibility Directory</h2>
{{end}}

{{define "content"}}
<div id="oc-root" data-can-manage="{{if .Permissions.ManageOfficerCommand}}true{{else}}false{{end}}">
    <div id="oc-error" class="oc-error hidden"></div>

    <div class="oc-header-row">
        <div>
            <h2 style="margin:0;">Responsibilities</h2>
        </div>
        {{if .Permissions.ManageOfficerCommand}}
        <button class="btn btn-primary" id="btn-add-category">+ Add Category</button>
        {{end}}
    </div>

    <div class="oc-filter-bar">
        <select id="filter-leader">
            <option value="">All Leaders</option>
        </select>
        <div id="filter-frequency-chips" class="filter-chip-group" role="group" aria-label="Filter by frequency">
            <button class="filter-chip active" data-freq="">All</button>
            <button class="filter-chip" data-freq="Daily">Daily</button>
            <button class="filter-chip" data-freq="Weekly">Weekly</button>
            <button class="filter-chip" data-freq="Seasonal">Seasonal</button>
        </div>
    </div>

    <div id="oc-categories"></div>
</div>
{{end}}

{{define "modals"}}
<!-- Add Category Modal -->
<div id="add-cat-modal" class="modal">
    <div class="modal-content">
        <h2>Add Category</h2>
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="add-cat-name" class="form-input" placeholder="e.g. Combat Operations">
            <p id="add-cat-error" class="oc-modal-error" style="display:none;"></p>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" id="add-cat-cancel">Cancel</button>
            <button class="btn btn-primary" id="add-cat-save">Save</button>
        </div>
    </div>
</div>

<!-- Responsibility Modal -->
<div id="resp-modal" class="modal">
    <div class="modal-content">
        <h2 id="resp-modal-title">Add Responsibility</h2>
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="resp-name" class="form-input" placeholder="e.g. Member Recruiting">
            <p id="resp-name-error" class="oc-modal-error" style="display:none;"></p>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="resp-desc" class="form-input" style="resize:vertical;min-height:70px;" placeholder="Brief description of this responsibility"></textarea>
        </div>
        <div class="form-group">
            <label>Frequency</label>
            <select id="resp-freq" class="form-input">
                <option value="Daily">Daily</option>
                <option value="Weekly" selected>Weekly</option>
                <option value="Seasonal">Seasonal</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" id="resp-modal-cancel">Cancel</button>
            <button class="btn btn-primary" id="resp-modal-save">Save</button>
        </div>
    </div>
</div>
{{end}}

{{define "scripts"}}
<div id="page-config" data-can-manage="{{if .Permissions.ManageOfficerCommand}}true{{else}}false{{end}}" hidden></div>
<script src="/member-picker.js"></script>
<script src="/officer_command.js"></script>
{{end}}
