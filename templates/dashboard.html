{{define "head_tags"}}
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
<link rel="stylesheet" href="/dashboard.css">
{{end}}

{{define "header_text"}}
<h1>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Dashboard
</h1>
<h2>Alliance at a glance</h2>
{{end}}

{{define "content"}}
<div class="dash-toolbar">
    <button id="btn-customize" class="btn btn-secondary btn-sm"><svg width="14" height="14" aria-hidden="true" class="svg-icon"><use href="/icons.svg#icon-settings"/></svg> Customize</button>
</div>

<div id="customize-panel" style="display:none">
    <p class="help-text">Drag cards to reorder. Check to show, uncheck to hide.</p>
    <ul id="customize-list"></ul>
    <div class="button-group" style="margin-top:0.75rem">
        <button id="btn-save-prefs" class="btn btn-primary btn-sm">Save</button>
        <button id="btn-cancel-prefs" class="btn btn-secondary btn-sm">Cancel</button>
        <span id="prefs-save-status" style="margin-left:8px;font-size:0.85em;"></span>
    </div>
</div>

<div id="dashboard-grid"></div>
{{end}}

{{define "scripts"}}
<div id="page-config"
     data-vs-minimum="{{.VSMinimumPoints}}"
     data-vs-flag-days="{{.VsFlagDaysThreshold}}"
     data-vs-week="{{.VSEvalWeek}}"
     data-vs-completed="{{.VSCompletedDays}}"
     data-vs-fallback="{{if .VSFallbackActive}}true{{else}}false{{end}}"
     data-user-rank="{{.Rank}}"
     data-is-admin="{{if .IsAdmin}}true{{else}}false{{end}}"
     hidden></div>
<script src="/dashboard.js"></script>
{{end}}
