<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Last War Alliance Manager</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div id="csrf-container" style="display:none;">
        {{.CSRFToken}}
    </div>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>🎮 Last War</h1>
                <p>Alliance Manager Login</p>
            </div>

            <div class="login-form">
                <div id="error-message" class="error-message"></div>
                <div id="success-message" class="success-message"></div>

                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Username:</label>
                        <input type="text" id="username" required placeholder="Enter username" autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" required placeholder="Enter password" autocomplete="current-password">
                    </div>
                    <button type="submit" class="login-btn" id="login-btn">Login</button>
                </form>

                {{ if .LoginMessage }}
                <div class="login-banner">
                    {{ .LoginMessage }}
                </div>
                {{ end }}
                
            </div>
        </div>
    </div>

    <div id="force-password-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>🔒 Password Update Required</h3>
            <p style="margin-bottom: 15px; font-size: 0.9em; color: var(--text-secondary);">Your password has expired or an admin requires you to update it.</p>

            <ul id="password-rules" class="password-rules" style="list-style: none;">
                <li style="color: var(--text-secondary);">⚪ Loading requirements...</li>
            </ul>

            <form id="force-password-form">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="force-new-password" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="force-confirm-password" required autocomplete="new-password">
                    <div id="force-match-status" style="margin-top: 5px; font-size: 0.85em; font-weight: bold; display: none;"></div>
                </div>
                <div id="force-password-error" class="error-message" style="font-size: 0.9em; padding: 8px;"></div>
                <button type="submit" class="login-btn" id="force-submit-btn" disabled style="opacity: 0.6; cursor: not-allowed;">Update & Login</button>
            </form>
        </div>
    </div>

    <script src="/csrf.js"></script>
    <script src="/login.js"></script>
</body>
</html>
