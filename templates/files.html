{{define "header_text"}}
    <h1>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        Files
    </h1>
    <h2>Alliance Files &amp; Documents</h2>
{{end}}

{{define "content"}}
    <div class="action-bar">
        {{if .Permissions.UploadFiles}}
        <button id="upload-file-btn" class="btn btn-primary">Upload File</button>
        {{end}}
    </div>

    <div class="card">
        <div class="card-header">
            <h2 class="icon-heading"><svg width="16" height="16" aria-hidden="true" class="svg-icon"><use href="/icons.svg#icon-folder"/></svg> Alliance Documents</h2>
        </div>
        <div id="files-grid" class="members-grid" style="display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));">
            <div class="loading">Loading files...</div>
        </div>
    </div>
{{end}}

{{define "modals"}}
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h2>Edit File Details</h2>
            <form id="edit-form">
                <div class="form-group">
                    <label>Document Title:</label>
                    <input type="text" id="edit-file-title" required class="form-input">
                </div>
                <div class="form-group">
                    <label>Minimum Rank Required to View:</label>
                    <select id="edit-file-min-rank" class="form-input">
                        <option value="R1">R1 (Everyone)</option>
                        <option value="R2">R2</option>
                        <option value="R3">R3</option>
                        <option value="R4">R4 & R5 Only</option>
                        <option value="R5">R5 Only</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Minimum Rank Required to Edit (Docs/Sheets only):</label>
                    <select id="edit-file-min-edit-rank" class="form-input">
                        <option value="R1">R1 (Everyone)</option>
                        <option value="R2">R2</option>
                        <option value="R3">R3</option>
                        <option value="R4">R4 & R5 Only</option>
                        <option value="R5">R5 Only</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary" id="edit-submit-btn">Save Changes</button>
                    <button type="button" class="btn btn-secondary" id="edit-cancel-btn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="upload-modal" class="modal">
        <div class="modal-content">
            <h2>Upload File</h2>
            <form id="upload-form">
                <div class="form-group">
                    <label>Document Title:</label>
                    <input type="text" id="file-title" required class="form-input">
                </div>
                <div class="form-group">
                    <label>Select File (Images, Spreadsheets, Docs):</label>
                    <input type="file" id="file-input" required class="form-input" style="padding: 10px;">
                </div>
                <div class="form-group">
                    <label>Minimum Rank Required to View:</label>
                    <select id="file-min-rank" class="form-input">
                        <option value="R1">R1 (Everyone)</option>
                        <option value="R2">R2</option>
                        <option value="R3">R3</option>
                        <option value="R4">R4 & R5 Only</option>
                        <option value="R5">R5 Only</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Minimum Rank Required to Edit (Docs/Sheets only):</label>
                    <select id="file-min-edit-rank" class="form-input">
                        <option value="R1">R1 (Everyone)</option>
                        <option value="R2">R2</option>
                        <option value="R3">R3</option>
                        <option value="R4" selected>R4 & R5 Only</option>
                        <option value="R5">R5 Only</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary" id="upload-submit-btn">Upload</button>
                    <button type="button" class="btn btn-secondary" id="upload-cancel-btn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="image-modal" class="modal">
        <div class="modal-content modal-lg" style="text-align: center;">
            <h2 id="image-modal-title"></h2>
            <img id="image-modal-img" src="" style="max-width: 100%; height: auto; border-radius: 8px; margin-top: 15px;">
        </div>
    </div>

    <div id="document-modal" class="modal">
        <div class="modal-content modal-xl">
            <div id="document-modal-body" style="height: 100%; width: 100%; padding-top: 30px;">
            </div>
        </div>
    </div>
{{end}}

{{define "scripts"}}
<div id="page-config"
    data-can-manage="{{if .Permissions.ManageFiles}}true{{else}}false{{end}}"
    data-can-upload="{{if .Permissions.UploadFiles}}true{{else}}false{{end}}"
    hidden></div>
<script src="/files.js"></script>
{{end}}
