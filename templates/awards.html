{{define "content"}}
            <section class="awards-controls">
                <div class="week-selector">
                    <button id="prev-week" class="week-nav-btn">← Previous Week</button>
                    <div class="week-info">
                        <h3 id="week-display">Week of January 7, 2025</h3>
                        <p class="week-subtitle">Sunday Awards</p>
                    </div>
                    <button id="next-week" class="week-nav-btn">Next Week →</button>
                </div>
                <div class="awards-actions">
                    <button id="toggle-all-awards-btn" class="secondary-btn">⚙️ Show All Awards</button>
                    <button id="save-awards-btn" class="save-btn">💾 Save Awards</button>
                    <button id="clear-awards-btn" class="clear-btn">🗑️ Clear Week</button>
                </div>
            </section>

            <section class="awards-form-section">
                <div class="add-award-section" style="margin-bottom: 20px; padding: 15px; background: var(--card-bg); border-radius: 10px; border: 2px dashed var(--border-color);">
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="text" id="new-award-search" placeholder="🔍 Search or add new award type..." style="flex: 1; padding: 10px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 14px;">
                        <button id="add-award-btn" class="secondary-btn" style="white-space: nowrap;">➕ Add New Award</button>
                    </div>
                    <div id="award-suggestions" style="margin-top: 10px; display: none;"></div>
                </div>
                
                <div id="awards-grid" class="awards-grid">
                    <!-- Awards will be generated here -->
                </div>
            </section>

            <section class="history-section">
                <h3>📊 Awards History</h3>
                <div class="history-filters">
                    <input type="text" id="history-search" placeholder="🔍 Search by member name..." class="history-search">
                    <select id="week-filter" class="week-filter">
                        <option value="">All Weeks</option>
                    </select>
                </div>
                <div id="history-content" class="history-content">
                    <p class="loading">Loading history...</p>
                </div>
            </section>
{{end}}

{{define "scripts"}}
    <script src="awards.js"></script>
{{end}}
