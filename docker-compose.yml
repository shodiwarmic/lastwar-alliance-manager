services:
  alliance-manager:
    image: ghcr.io/YOUR_GITHUB_USERNAME/lastwar-alliance-manager:latest
    container_name: alliance-manager
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    # Swapped to "mapping" syntax for strict docker-compose parsers
    extra_hosts:
      "${APP_DOMAIN}": "host-gateway"
      "${COLLABORA_DOMAIN}": "host-gateway"

  collabora:
    image: collabora/code
    container_name: collabora
    restart: unless-stopped
    cap_add:
      - MKNOD
    ports:
      - "9980:9980"
    environment:
      - aliasgroup1=https://${APP_DOMAIN}:443
      - extra_params=--o:ssl.enable=false --o:ssl.termination=true
    # Swapped to "mapping" syntax here as well
    extra_hosts:
      "${APP_DOMAIN}": "host-gateway"